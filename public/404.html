<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Page Not Found — Anika Rao Studio</title>
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<!-- Tailwind — compiled locally via the Tailwind CLI (see package.json "build:css") -->
<link rel="stylesheet" href="css/tailwind.css" />

<style>
  .bp-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(212, 197, 185, 0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212, 197, 185, 0.07) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 35%, transparent 85%);
    mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 35%, transparent 85%);
  }
  .corner-tick {
    position: absolute;
    width: 22px; height: 22px;
    border-color: #D4C5B9;
    opacity: 0.85;
  }
  .corner-tick.tl { top: 0; left: 0; border-top: 1.5px solid; border-left: 1.5px solid; }
  .corner-tick.tr { top: 0; right: 0; border-top: 1.5px solid; border-right: 1.5px solid; }
  .corner-tick.bl { bottom: 0; left: 0; border-bottom: 1.5px solid; border-left: 1.5px solid; }
  .corner-tick.br { bottom: 0; right: 0; border-bottom: 1.5px solid; border-right: 1.5px solid; }
</style>
</head>

<body class="bg-obsidian text-white font-sans antialiased min-h-screen flex items-center justify-center px-6 selection:bg-beige selection:text-obsidian">

  <div class="relative max-w-xl w-full py-20 px-8 sm:px-14 text-center">
    <div class="bp-grid" aria-hidden="true"></div>
    <span class="corner-tick tl"></span>
    <span class="corner-tick tr"></span>
    <span class="corner-tick bl"></span>
    <span class="corner-tick br"></span>

    <p class="relative font-mono text-[11px] uppercase tracking-widest2 text-beige/80 mb-6">Index Error — 404</p>

    <h1 class="relative font-display text-[20vw] sm:text-[8rem] leading-none mb-6">404</h1>

    <p class="relative text-white/70 text-[15px] leading-relaxed max-w-sm mx-auto mb-10">
      This drawing isn't on file. The page you're looking for has either been moved, renamed, or was never built.
    </p>

    <a href="/" class="relative inline-flex items-center gap-2 rounded-full bg-beige text-obsidian font-mono text-[12px] uppercase tracking-widest2 px-6 py-3.5 hover:bg-white transition-colors duration-300">
      Back to Index
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M3 10L10 3M10 3H4M10 3V9" stroke="currentColor" stroke-width="1.3"/></svg>
    </a>
  </div>

</body>
</html>
